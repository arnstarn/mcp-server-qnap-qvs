# QPKG configuration for mcp-server-qnap-qvs
# See: https://github.com/qnap-dev/QDK

QPKG_NAME="mcp-server-qnap-qvs"
QPKG_VER="0.1.0"
QPKG_AUTHOR="arnstarn"
QPKG_LICENSE="MIT"
QPKG_SUMMARY="MCP server for QNAP Virtualization Station"

# Service configuration
QPKG_RC_NUM="150"
QPKG_SERVICE_PROGRAM="/share/CACHEDEV1_DATA/.qpkg/mcp-server-qnap-qvs/mcp-server-qnap-qvs.sh"
QPKG_SERVICE_PORT="8445"

# Web UI (optional - would show a config page)
# QPKG_WEBUI="/mcp-qvs/"
# QPKG_WEB_PORT="8445"

# Requirements
QTS_MINI_VERSION="5.1.0"
QPKG_REQUIRE="container-station >= 3.0"

# Container Station integration
QPKG_CONTAINER_ENABLED="1"

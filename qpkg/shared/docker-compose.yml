# QPKG docker-compose — runs inside the QPKG installation directory
services:
  mcp-server-qnap-qvs:
    image: ghcr.io/arnstarn/mcp-server-qnap-qvs:latest
    container_name: mcp-server-qnap-qvs
    restart: unless-stopped
    network_mode: host
    volumes:
      - .:/config
      - /etc/stunnel/stunnel.pem:/certs/stunnel.pem:ro
    environment:
      - MCP_TRANSPORT=sse
      - MCP_HOST=0.0.0.0
      - MCP_PORT=8445
      - CONFIG_UI_PORT=8446
      - CONFIG_UI_HOST=127.0.0.1
      - CONFIG_UI_BASE_PATH=/mcp-qvs
      - MCP_SSL_CERT=/certs/stunnel.pem
      - MCP_SSL_PORT=8443
      - ENV_FILE=/config/.env

name: Build QPKG

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build-qpkg:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build QDK builder image
        run: docker build -t qpkg-builder -f qpkg/Dockerfile.builder .

      - name: Build QPKG
        run: |
          docker run --rm \
            -v "${{ github.workspace }}/qpkg:/work" \
            qpkg-builder

      - name: Upload QPKG artifact
        uses: actions/upload-artifact@v4
        with:
          name: mcp-server-qnap-qvs-qpkg
          path: qpkg/build/*.qpkg

      - name: Attach QPKG to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: qpkg/build/*.qpkg
